<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="100%" stop-color="#12121a" />
    </linearGradient>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="50" />
    </clipPath>
    <clipPath id="toolClip">
      <rect width="80" height="80" rx="16" />
    </clipPath>
    <style>
      .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; }
      .text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; }
      .bold { font-weight: 700; }
      .caps { text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGradient)" />
  <rect width="1080" height="1080" fill="rgba(99, 102, 241, 0.02)" />

  <!-- Abstract Decorative Elements -->
  <circle cx="1080" cy="0" r="400" fill="#6366f1" opacity="0.1" filter="url(#glow)" />
  <circle cx="0" cy="1080" r="300" fill="#06b6d4" opacity="0.1" filter="url(#glow)" />

  <!-- HEADER -->
  <g transform="translate(60, 60)">
    <rect width="100" height="100" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" />
    <image href="logo.png" x="20" y="20" width="60" height="60" />
    <g transform="translate(120, 20)">
      <text class="title" font-size="36" fill="white">No Code &amp; Agentic AI</text>
      <text class="text caps" y="38" font-size="20" fill="#a1a1aa">For Life Sciences</text>
    </g>
    <g transform="translate(820, 25)">
      <rect width="140" height="40" rx="20" fill="#6366f1" />
      <text x="70" y="26" text-anchor="middle" class="title" font-size="16" fill="white">COHORT 01</text>
    </g>
  </g>

  <!-- HERO SECTION -->
  <g transform="translate(60, 240)">
    <text class="title" font-size="80" fill="white" letter-spacing="-0.02em">
      <tspan x="0" y="0">Accelerate Your</tspan>
      <tspan x="0" y="90" fill="url(#brandGradient)">Biomedical Research</tspan>
    </text>
    <text class="text" x="0" y="210" font-size="28" fill="#a1a1aa" line-height="1.4">
      <tspan x="0" dy="0">Master Generative AI and Agentic workflows for drug discovery,</tspan>
      <tspan x="0" dy="40">omics analysis, and scientific synthesis — <tspan fill="white" class="bold">no coding required.</tspan></tspan>
    </text>
  </g>

  <!-- TOOLS SECTION (The "What Tools" part with CORRECT logos) -->
  <g transform="translate(60, 520)">
    <text class="title caps" font-size="20" fill="#6366f1">Industry-Standard Tech Stack</text>
    <g transform="translate(0, 40)">
      <!-- AI Tools -->
      <g transform="translate(0, 0)">
        <image href="claude_logo.jpg" width="80" height="80" clip-path="url(#toolClip)" />
        <text x="40" y="105" text-anchor="middle" class="title" font-size="14" fill="white">Claude 3.5</text>
      </g>
      <g transform="translate(130, 0)">
        <image href="google_aistudio.png" width="80" height="80" clip-path="url(#toolClip)" />
        <text x="40" y="105" text-anchor="middle" class="title" font-size="14" fill="white">Gemini 1.5</text>
      </g>
      <g transform="translate(260, 0)">
        <image href="Google_Colab.png" width="80" height="80" clip-path="url(#toolClip)" />
        <text x="40" y="105" text-anchor="middle" class="title" font-size="14" fill="white">Colab</text>
      </g>
      <g transform="translate(390, 0)">
        <image href="notebooklm.jpg" width="80" height="80" clip-path="url(#toolClip)" />
        <text x="40" y="105" text-anchor="middle" class="title" font-size="14" fill="white">NotebookLM</text>
      </g>
      
      <!-- Bio Tools -->
      <g transform="translate(560, 0)">
        <rect x="-20" y="0" width="1" height="80" fill="rgba(255,255,255,0.1)" />
        <image href="scanpy.jpg" width="80" height="80" clip-path="url(#toolClip)" />
        <text x="40" y="105" text-anchor="middle" class="title" font-size="14" fill="white">Scanpy</text>
      </g>
      <g transform="translate(690, 0)">
        <image href="seurat.png" width="80" height="80" clip-path="url(#toolClip)" />
        <text x="40" y="105" text-anchor="middle" class="title" font-size="14" fill="white">Seurat</text>
      </g>
      <g transform="translate(820, 0)">
        <image href="bioconductor.png" width="80" height="80" clip-path="url(#toolClip)" />
        <text x="40" y="105" text-anchor="middle" class="title" font-size="14" fill="white">Bioc</text>
      </g>
    </g>
  </g>

  <!-- PROGRAM HIGHLIGHTS -->
  <g transform="translate(60, 720)">
    <rect width="960" height="160" rx="32" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" />
    
    <g transform="translate(60, 45)">
      <text class="title caps" font-size="16" fill="#06b6d4">Duration</text>
      <text y="45" class="title" font-size="42" fill="white">4 Weeks</text>
    </g>
    <g transform="translate(320, 45)">
      <text class="title caps" font-size="16" fill="#06b6d4">Format</text>
      <text y="45" class="title" font-size="42" fill="white">Virtual</text>
    </g>
    <g transform="translate(580, 45)">
      <text class="title caps" font-size="16" fill="#06b6d4">Language</text>
      <text y="45" class="title" font-size="42" fill="white">Bangla</text>
    </g>
    
    <g transform="translate(800, 40)">
      <rect width="120" height="80" rx="16" fill="url(#brandGradient)" />
      <text x="60" y="48" text-anchor="middle" class="title" font-size="24" fill="white">APPLY</text>
    </g>
  </g>

  <!-- FOOTER -->
  <g transform="translate(0, 920)">
    <rect width="1080" height="160" fill="rgba(255,255,255,0.02)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="rgba(255,255,255,0.1)" />
    
    <g transform="translate(60, 30)">
      <g clip-path="url(#circleClip)">
        <image href="jubayer.jpg" width="100" height="100" />
      </g>
      <g transform="translate(120, 25)">
        <text class="title" font-size="32" fill="white">Md. Jubayer Hossain</text>
        <text y="32" class="text" font-size="20" fill="#a1a1aa">Founder &amp; CEO, DeepBio Limited</text>
      </g>
      
      <g transform="translate(740, 15)">
        <text x="140" y="30" text-anchor="middle" class="title caps" font-size="14" fill="#6366f1">Registration Link</text>
        <text x="140" y="65" text-anchor="middle" class="title" font-size="24" fill="white">deepbio.com/ai-ls</text>
      </g>
    </g>
  </g>
</svg>
